name: Release to NPM Registry
on:
  push:
    branches:
      - main
      - staging
  repository_dispatch:
    types: [prod-release]

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Build package
        run: npm run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENVIRONMENT: ${{ github.ref }}
          NPM_CONFIG_PROVENANCE: true
        run: npx semantic-release

      - name: Publish
        env:
          ENVIRONMENT: ${{ github.ref }}
        run: |
          npm publish --access public --provenance -w packages/core
          npm publish --access public --provenance -w packages/react-library
          npm publish --access public --provenance ./packages/angular-library/projects/components/dist
          npm publish --access public --provenance -w packages/core
          npm publish --access public --provenance -w packages/react-library
          npm publish --access public --provenance ./packages/angular-library/projects/components/dist

      - name: Update staging branch
        if: |
          contains('refs/heads/main', github.ref)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull
          git stash
          git checkout staging
          git merge main
          git push --set-upstream origin staging
